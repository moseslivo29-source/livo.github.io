<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report School Issue - SIRTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }

        body { height: 100vh; overflow: hidden; }

        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 8px;
            margin: 40px auto;
        }

        h2 { text-align: center; color: #1b3b73; margin-bottom: 15px; }

        label { display: block; margin-top: 12px; font-weight: bold; }

        input, select, textarea {
            width: 100%; padding: 8px; margin-top: 5px;
            border-radius: 4px; border: 1px solid #ccc;
        }

        textarea { height: 90px; resize: vertical; }

        button {
            margin-top: 18px; width: 100%;
            padding: 10px; background: #1b3b73;
            color: #fff; border: none; border-radius: 4px;
        }
    </style>
</head>
<body>

<video class="video-bg" autoplay muted loop>
    <source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
    <h2>Report A School Issue</h2>

    <label>Name</label>
    <input type="text" id="name">

    <label>Role</label>
    <select id="role">
        <option>Student</option>
        <option>Teacher</option>
    </select>

    <label>Category</label>
    <select id="category">
        <option>Infrastructure</option>
        <option>Discipline</option>
        <option>Academics</option>
        <option>Learning Resources</option>
        <option>Health & Safety</option>
    </select>

    <label>Description</label>
    <textarea id="description"></textarea>

    <button onclick="saveReport()">Submit Report</button>
</div>

<script>
function saveReport() {
    let report = {
        name: document.getElementById("name").value,
        role: document.getElementById("role").value,
        category: document.getElementById("category").value,
        description: document.getElementById("description").value,
        status: "NEW"
    };

    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    reports.push(report);
    localStorage.setItem("reports", JSON.stringify(reports));

    alert("REPORT SUBMITTED SUCCESSFULLY!");
    window.location.href = "status.html";
}
</script>

</body>
</html>
